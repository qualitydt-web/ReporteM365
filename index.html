<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte M365 — Instituto para la Calidad PUCP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{
    --navy:#0B1F4B;--navy-mid:#163066;--blue:#1A5DC4;--sky:#3A9BD5;
    --accent:#00C2A8;--gold:#E8A020;--light:#F4F7FB;--white:#ffffff;
    --gray:#8A9BB5;--border:#D8E2F0;--text:#1A2540;--text-light:#4A5872;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh;}
  /* LOADING / NO DATA */
  .full-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--navy);text-align:center;padding:40px 20px;}
  .full-screen p{color:var(--gray);font-size:.95rem;font-weight:300;margin-top:12px;}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .logo-mark{width:64px;height:64px;background:var(--sky);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:28px;}
  /* REPORT */
  #report-screen{display:none;}
  .report-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}
  .report-header{background:var(--navy);color:#fff;border-radius:16px;padding:32px 40px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:24px;}
  .report-header h1{font-family:'DM Serif Display',serif;font-size:1.7rem;margin-bottom:4px;}
  .subtitle{color:var(--sky);font-size:.85rem;}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
  .period-badge{background:rgba(255,255,255,.1);border-radius:6px;padding:4px 12px;font-size:.78rem;color:rgba(255,255,255,.6);}
  .period-badge span{color:var(--accent);font-weight:600;}
  .toggle-wrap{background:rgba(255,255,255,.08);border-radius:8px;padding:4px;display:flex;gap:2px;}
  .toggle-btn{background:none;border:none;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:7px 18px;border-radius:6px;cursor:pointer;transition:all .2s;}
  .toggle-btn.active{background:var(--sky);color:#fff;}
  .report-date{color:rgba(255,255,255,.35);font-size:.75rem;}
  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px;}
  .stat-card{background:#fff;border-radius:12px;padding:20px 22px;border:1px solid var(--border);position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sky);}
  .stat-card.gold::before{background:var(--gold);}
  .stat-card.accent::before{background:var(--accent);}
  .stat-card.blue::before{background:var(--blue);}
  .stat-card.lime::before{background:#22c55e;}
  .stat-label{font-size:.72rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .stat-value{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--navy);line-height:1;margin-bottom:4px;}
  .stat-sub{font-size:.75rem;color:var(--text-light);}
  /* SECTIONS */
  .sections-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .section-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
  .section-card.full{grid-column:1/-1;}
  .section-head{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .section-head h2{font-size:.9rem;font-weight:600;color:var(--navy);}
  .section-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
  .si-blue{background:#E8F0FC;} .si-gold{background:#FEF3DC;} .si-lime{background:#DCFCE7;}
  .section-body{padding:16px 24px 20px;}
  /* BARS */
  .bar-list{display:flex;flex-direction:column;gap:8px;}
  .bar-item{display:grid;grid-template-columns:140px 1fr 58px;align-items:center;gap:10px;font-size:.78rem;border-radius:6px;padding:3px 6px;margin:0 -6px;}
  .bar-item.podium-1{background:rgba(232,160,32,.10);}
  .bar-item.podium-2{background:rgba(148,163,184,.08);}
  .bar-item.podium-3{background:rgba(180,120,60,.07);}
  .bar-item.podium-1 .bar-name{font-weight:700;color:var(--navy);}
  .bar-item.podium-2 .bar-name,.bar-item.podium-3 .bar-name{font-weight:600;}
  .bar-item.podium-1 .bar-val{font-weight:700;color:var(--gold);}
  .bar-item.podium-2 .bar-val{font-weight:600;color:#7a8fa8;}
  .bar-item.podium-3 .bar-val{font-weight:600;color:#a07848;}
  .bar-name{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{background:var(--light);border-radius:4px;height:10px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .bf-blue{background:linear-gradient(90deg,var(--blue),var(--sky));}
  .bf-gold{background:linear-gradient(90deg,var(--gold),#f0b93a);}
  .bf-navy{background:linear-gradient(90deg,var(--navy),var(--navy-mid));}
  .bf-lime{background:linear-gradient(90deg,#16a34a,#4ade80);}
  .bar-val{color:var(--text-light);font-size:.74rem;text-align:right;font-weight:500;}
  .no-data{text-align:center;color:var(--gray);font-size:.82rem;padding:24px 0;}
  /* ACTIONS */
  .actions-bar{display:flex;justify-content:flex-end;gap:12px;margin-bottom:24px;}
  .btn-primary{background:var(--navy);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;}
  .btn-primary:hover{background:var(--navy-mid);}
  .report-footer{text-align:center;color:var(--gray);font-size:.72rem;margin-top:32px;padding-top:20px;border-top:1px solid var(--border);}
  @media print{
    body{background:white;}
    #report-screen{display:block!important;}
    .actions-bar{display:none!important;}
    .report-wrap{padding:0;max-width:100%;}
    .report-header{border-radius:0;}
    .section-card,.stat-card{break-inside:avoid;}
    .toggle-wrap{display:none;}
    @page{size:A4 landscape;margin:12mm;}
  }
  @media(max-width:700px){
    .stats-row{grid-template-columns:1fr 1fr;}
    .sections-grid{grid-template-columns:1fr;}
    .section-card.full{grid-column:auto;}
    .report-header{flex-direction:column;align-items:flex-start;}
    .header-right{align-items:flex-start;}
  }
</style>
</head>
<body>

<div id="loading-screen" class="full-screen">
  <div class="spinner"></div>
  <p>Cargando reporte...</p>
</div>

<div id="nodata-screen" class="full-screen" style="display:none;">
  <div class="logo-mark">⚓</div>
  <p style="color:#fff;font-size:1rem;font-weight:500;">No hay reporte publicado aún.</p>
  <p>El administrador aún no ha publicado datos.</p>
</div>

<div id="report-screen">
  <div class="report-wrap">
    <div class="report-header">
      <div style="display:flex;align-items:center;gap:20px;">
        <img src="logo.png" alt="Instituto para la Calidad PUCP" style="height:56px;filter:brightness(0) invert(1);flex-shrink:0;" onerror="this.style.display='none'">
        <div>
          <h1>Reporte de Uso M365</h1>
          <div class="subtitle" id="report-subtitle">Instituto para la Calidad · PUCP</div>
        </div>
      </div>
      <div class="header-right">
        <div class="period-badge">Período: <span id="period-label">—</span></div>
        <div class="toggle-wrap">
          <button class="toggle-btn active" id="btn-week" onclick="setMode('week')">Semanal</button>
          <button class="toggle-btn" id="btn-month" onclick="setMode('month')">Mensual</button>
        </div>
        <div class="report-date" id="report-date"></div>
      </div>
    </div>
    <div class="actions-bar">
      <button class="btn-primary" onclick="downloadInfographic()">⬇️ Descargar infografía</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="sections-grid" id="sections-grid"></div>
    <div class="report-footer" id="report-footer"></div>
  </div>
</div>

<script>
let allData={teams:[],onedrive:[]};
let detectedPeriod=7;
let currentMode='week';

window.addEventListener('DOMContentLoaded',async()=>{
  try{
    const resp=await fetch('report-data.json?_='+Date.now());
    if(!resp.ok) throw new Error('no data');
    const saved=await resp.json();
    allData=saved.allData;
    detectedPeriod=saved.detectedPeriod||7;
    currentMode=detectedPeriod<=7?'week':'month';
    document.getElementById('btn-week').style.display=detectedPeriod<=7?'':'none';
    document.getElementById('btn-month').style.display=detectedPeriod>7?'':'none';
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('report-screen').style.display='block';
    renderReport();
  }catch(e){
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('nodata-screen').style.display='flex';
  }
});

function setMode(m){
  currentMode=m;
  document.getElementById('btn-week').classList.toggle('active',m==='week');
  document.getElementById('btn-month').classList.toggle('active',m==='month');
  renderReport();
}

function num(v){
  if(typeof v==='number') return v;
  if(typeof v==='string'){const n=parseFloat(v.replace(/,/g,''));return isNaN(n)?0:n;}
  return 0;
}

function filterActive(rows,days){
  return rows.filter(row=>{
    const refresh=row['Report Refresh Date']||'';
    const lastAct=row['Last Activity Date']||'';
    if(!lastAct) return false;
    const base=refresh?new Date(refresh):new Date();
    const act=new Date(lastAct);
    if(isNaN(act)||isNaN(base)) return false;
    const diff=(base-act)/86400000;
    return diff>=0&&diff<=days;
  });
}

function emailToName(email){
  if(!email) return '—';
  const p=email.split('@')[0];
  return p.replace(/\./g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim();
}

function teamsName(row){
  const email=(row['User Principal Name']||'').toLowerCase();
  const match=allData.onedrive.find(r=>(r['Owner Principal Name']||'').toLowerCase()===email);
  if(match&&match['Owner Display Name']) return match['Owner Display Name'];
  return emailToName(row['User Principal Name']||'');
}

function renderReport(){
  const days=currentMode==='week'?7:30;
  const modeLbl=currentMode==='week'?'esta semana':'este mes';
  const tRows=filterActive(allData.teams,days);
  const dRows=filterActive(allData.onedrive,days);
  const totalUsers=tRows.length;
  const totalMeetings=tRows.reduce((s,r)=>s+num(r['Meetings Attended Count']),0);
  const totalSecs=tRows.reduce((s,r)=>s+num(r['Audio Duration In Seconds']),0);
  const totalHours=(totalSecs/3600).toFixed(1);
  const totalChats=tRows.reduce((s,r)=>s+num(r['Private Chat Message Count']),0);
  const totalActiveFiles=dRows.reduce((s,r)=>s+num(r['Active File Count']),0);
  const today=new Date();
  const dateStr=today.toLocaleDateString('es-PE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('report-date').textContent=dateStr.charAt(0).toUpperCase()+dateStr.slice(1);
  document.getElementById('report-subtitle').textContent='Instituto para la Calidad · PUCP — '+(currentMode==='week'?'Reporte Semanal':'Reporte Mensual');
  document.getElementById('period-label').textContent=detectedPeriod+' días';
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">Usuarios Activos</div><div class="stat-value">${totalUsers}</div><div class="stat-sub">en el período</div></div>
    <div class="stat-card gold"><div class="stat-label">Reuniones Asistidas</div><div class="stat-value">${totalMeetings}</div><div class="stat-sub">total del equipo</div></div>
    <div class="stat-card accent"><div class="stat-label">Horas en Reuniones</div><div class="stat-value">${totalHours}</div><div class="stat-sub">horas acumuladas</div></div>
    <div class="stat-card blue"><div class="stat-label">Mensajes Directos</div><div class="stat-value">${totalChats>=1000?(totalChats/1000).toFixed(1)+'k':totalChats}</div><div class="stat-sub">chats privados</div></div>
    <div class="stat-card lime"><div class="stat-label">Archivos Activos</div><div class="stat-value">${totalActiveFiles>=1000?(totalActiveFiles/1000).toFixed(1)+'k':totalActiveFiles}</div><div class="stat-sub">modificados en OneDrive</div></div>
  `;
  const topMeetings=[...tRows].filter(r=>num(r['Meetings Attended Count'])>0).sort((a,b)=>num(b['Meetings Attended Count'])-num(a['Meetings Attended Count'])).slice(0,12);
  const topHours=[...tRows].filter(r=>num(r['Audio Duration In Seconds'])>0).sort((a,b)=>num(b['Audio Duration In Seconds'])-num(a['Audio Duration In Seconds'])).slice(0,12);
  const topChats=[...tRows].filter(r=>num(r['Private Chat Message Count'])>0).sort((a,b)=>num(b['Private Chat Message Count'])-num(a['Private Chat Message Count'])).slice(0,12);
  const topActiveFiles=[...dRows].filter(r=>num(r['Active File Count'])>0).sort((a,b)=>num(b['Active File Count'])-num(a['Active File Count'])).slice(0,12);
  document.getElementById('sections-grid').innerHTML=`
    <div class="section-card"><div class="section-head"><div class="section-icon si-blue">📅</div><h2>Top Reuniones Asistidas · ${modeLbl}</h2></div><div class="section-body">${barList(topMeetings,r=>num(r['Meetings Attended Count']),teamsName,'bf-blue',v=>v)}</div></div>
    <div class="section-card"><div class="section-head"><div class="section-icon si-gold">⏱</div><h2>Top Horas en Reuniones · ${modeLbl}</h2></div><div class="section-body">${barList(topHours,r=>num(r['Audio Duration In Seconds'])/3600,teamsName,'bf-gold',v=>v.toFixed(1)+'h')}</div></div>
    <div class="section-card full"><div class="section-head"><div class="section-icon si-blue">💬</div><h2>Top Mensajes Directos · ${modeLbl}</h2></div><div class="section-body">${barList(topChats,r=>num(r['Private Chat Message Count']),teamsName,'bf-navy',v=>v.toLocaleString('es-PE'))}</div></div>
    <div class="section-card full"><div class="section-head"><div class="section-icon si-lime">📂</div><h2>Top Archivos Activos en OneDrive · ${modeLbl}</h2></div><div class="section-body">${barList(topActiveFiles,r=>num(r['Active File Count']),r=>r['Owner Display Name']||'—','bf-lime',v=>v.toLocaleString('es-PE'))}</div></div>
  `;
  document.getElementById('report-footer').textContent=`Instituto para la Calidad · PUCP — Generado el ${dateStr}`;
}

function barList(rows,valFn,nameFn,colorClass,fmtFn){
  if(!rows.length) return `<div class="no-data">Sin datos activos para este período</div>`;
  const max=valFn(rows[0]);
  const medals=['🥇','🥈','🥉'];
  return `<div class="bar-list">`+rows.map((r,i)=>{
    const val=valFn(r);const pct=max>0?Math.min((val/max*100),100).toFixed(1):0;
    const name=nameFn(r);const podiumClass=i<3?` podium-${i+1}`:'';const prefix=i<3?`${medals[i]} `:'';
    return `<div class="bar-item${podiumClass}"><div class="bar-name" title="${name}">${prefix}${name}</div><div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div><div class="bar-val">${fmtFn(val)}</div></div>`;
  }).join('')+`</div>`;
}

async function downloadInfographic(){
  const actionsBar=document.querySelector('.actions-bar');
  actionsBar.style.display='none';
  try{
    const canvas=await html2canvas(document.querySelector('.report-wrap'),{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#F4F7FB',logging:false,windowWidth:1200});
    const link=document.createElement('a');
    link.download=`Reporte_M365_${new Date().toISOString().slice(0,10)}.png`;
    link.href=canvas.toDataURL('image/png');link.click();
  }catch(e){alert('Error generando la imagen: '+e.message);}
  finally{actionsBar.style.display='';}
}
</script>
</body>
</html>
